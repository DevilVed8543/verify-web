<!DOCTYPE html>
<html>
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      color: #00ff99;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* ₹ Rain Canvas */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Center Circle */
    .circle {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 4px solid #00ff99;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 20px;
      z-index: 2;
    }

    /* Loading animation */
    .circle::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top: 4px solid #00ff99;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Credit text */
    .credit {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: #00ff99;
      font-size: 14px;
      z-index: 2;
    }
  </style>
</head>
<body>

<canvas id="rain"></canvas>

<div class="circle" id="status">🔄 Verifying...</div>

<div class="credit">
  Bot By ~ @DevilVed0 ✈️
</div>

<script>
/* ₹ RAIN EFFECT */
let canvas = document.getElementById("rain")
let ctx = canvas.getContext("2d")

canvas.height = window.innerHeight
canvas.width = window.innerWidth

let chars = "₹₹₹₹₹₹₹₹₹₹"
let fontSize = 18
let columns = canvas.width / fontSize
let drops = []

for (let x = 0; x < columns; x++) {
  drops[x] = 1
}

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  ctx.fillStyle = "#00ff99"
  ctx.font = fontSize + "px monospace"

  for (let i = 0; i < drops.length; i++) {
    let text = "₹"
    ctx.fillText(text, i * fontSize, drops[i] * fontSize)

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0

    drops[i]++
  }
}

setInterval(draw, 33)

/* TELEGRAM WEB APP */
let tg = window.Telegram.WebApp
tg.expand()

/* VERIFY REQUEST */
fetch("https://telegram-verify-6etl.onrender.com", {
  method: "POST"
})
.then(res => res.json())
.then(data => {
  if (data.status === "ok") {
    document.getElementById("status").innerText = "✅ Verified"
  } else {
    document.getElementById("status").innerText = "❌ Same Device"
  }
})
.catch(() => {
  document.getElementById("status").innerText = "⚠️ Error"
})
</script>

</body>
</html>
