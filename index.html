<!DOCTYPE html>
<html>
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      font-family: Arial;
      color: #b983ff;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      background: #b983ff;
      opacity: 0.5;
      animation: float 4s ease-in-out infinite, glow 2s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes glow {
      0%,100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .circle {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid #b983ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .circle::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top: 3px solid #b983ff;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .credit {
      position: absolute;
      bottom: 25px;
      width: 100%;
      text-align: center;
      font-size: 18px;
    }

    a {
      color: #b983ff;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div id="status" class="circle">🔄 Verifying...</div>

<div class="credit">
  Bot By ~ 
  <a href="https://t.me/DevilVed0" target="_blank">@DevilVed0</a>
  <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="18">
</div>

<script>
// floating dots
for (let i = 0; i < 40; i++) {
  let d = document.createElement("div")
  d.className = "dot"
  let s = Math.random()*4+2
  d.style.width = s+"px"
  d.style.height = s+"px"
  d.style.left = Math.random()*innerWidth+"px"
  d.style.top = Math.random()*innerHeight+"px"
  document.body.appendChild(d)
}

// Telegram WebApp
let tg = window.Telegram.WebApp
tg.expand()

let user = tg.initDataUnsafe.user

// fallback for browser testing
let user_id = user ? user.id : Math.floor(Math.random()*1000000)

// verify request
fetch("https://telegram-verify-6etl.onrender.com/verify", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ user_id: user_id })
})
.then(res => res.json())
.then(data => {
  if (data.status === "ok") {
    document.getElementById("status").innerText = "✅ Verified"
  } else {
    document.getElementById("status").innerText = "❌ Same Device"
  }
})
.catch(() => {
  document.getElementById("status").innerText = "❌ Error"
})
</script>

</body>
</html>
