<!DOCTYPE html>
<html>
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family:sans-serif;text-align:center;margin-top:50px;">

<h2 id="status">🔄 Verifying...</h2>

<script>
fetch("https://telegram-verify-6etl.onrender.com", {
  method: "POST"
})
.then(res => res.json())
.then(data => {
  if (data.status === "ok") {
    document.getElementById("status").innerText = "✅ Verification Successful"
  } else {
    document.getElementById("status").innerText = "❌ Same device detected"
  }
})
.catch(() => {
  document.getElementById("status").innerText = "⚠️ Error"
})
</script>

</body>
</html>
